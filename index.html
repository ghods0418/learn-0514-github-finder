<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Finder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 상단 헤더 -->
    <header class="site-header" id="site-header">
      <div class="container">
        <h1 class="site-title">GitHub Finder</h1>
      </div>
    </header>

    <main class="container main-content">
      <!-- 검색 영역 (카드) -->
      <section class="card search-card" aria-labelledby="search-heading">
        <h2 id="search-heading" class="search-card__title">GitHub 사용자 검색</h2>
        <p class="search-card__desc">
          사용자 이름을 입력하여 프로필과 저장소를 확인하세요.
        </p>
        <div class="search-row">
          <label for="search-input" class="visually-hidden">GitHub 사용자명</label>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="GitHub 사용자명..."
            autocomplete="off"
            spellcheck="false"
          />
          <button type="button" id="search-btn" class="search-btn">검색</button>
        </div>
      </section>

      <!-- 상태 메시지 영역 -->
      <div id="status-message" class="status-message" role="status" aria-live="polite"></div>

      <!-- 사용자 프로필 카드 -->
      <section
        id="profile-container"
        class="profile-card"
        aria-label="사용자 프로필"
        hidden
      ></section>

      <!-- 최신 저장소 목록 -->
      <section id="repos-section" class="repos-section" hidden>
        <h2 class="repos-section__title">Latest Repos</h2>
        <ul id="repos-list" class="repos-list"></ul>
        <div class="repos-actions">
          <button type="button" id="load-more-btn" class="load-more-btn" hidden>
            더보기
          </button>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p class="site-footer__text">GitHub Finder ©</p>
      </div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
